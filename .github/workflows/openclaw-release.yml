name: Build OpenClaw Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      openclawTag:
        default: "2026.3.13"
        description: "OpenClaw Release Tag 2026.3.13, etc."
        required: true
      aliyunTag:
        default: ""
        description: "Aliyun Image Tag (empty = same as openclawTag)"
        required: false
      platforms:
        description: "Platforms"
        default: "linux/amd64,linux/arm64/v8"
        required: true
      pushLatest:
        description: "Push latest tag to Aliyun"
        default: "true"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ 过渡期兼容 Node.js 24

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ✅ 升级到 v4，修复 Node.js 20 警告
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 🔐 登录阿里云 ACR（替换原 Docker Hub 登录）
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ALICR_REGISTRY }}
          username: ${{ secrets.ALICR_USERNAME }}
          password: ${{ secrets.ALICR_PASSWORD }}

      - name: Download Source
        run: |
          set -euo pipefail
          # 根据触发方式获取版本号，手动触发时用户输入不带v，需要自动添加v前缀
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ github.event.inputs.openclawTag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          curl -fsSL "https://github.com/openclaw/openclaw/archive/refs/tags/${TAG}.tar.gz" \
            | tar -xz -C _src/openclaw --strip-components=1
          mkdir -p _src/openclaw/openclaw
          cp openclaw/Dockerfile openclaw/Caddyfile openclaw/docker-entrypoint.sh _src/openclaw/openclaw/

      # 🏗️ 构建并推送阿里云镜像
      - name: Build OpenClaw Image and Push
        uses: docker/build-push-action@v6
        with:
          context: _src/openclaw
          file: _src/openclaw/openclaw/Dockerfile
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          build-args: |
            OPENCLAW_INSTALL_BROWSER=true
            OPENCLAW_VERSION=${{ github.event.inputs.openclawTag }}
          tags: |
            ${{ secrets.ALICR_REGISTRY }}/${{ secrets.ALICR_NAMESPACE }}/openclaw:${{ github.event.inputs.aliyunTag != '' && github.event.inputs.aliyunTag || github.event.inputs.openclawTag }}
            ${{ github.event.inputs.pushLatest == 'true' && format('{0}/{1}/openclaw:latest', secrets.ALICR_REGISTRY, secrets.ALICR_NAMESPACE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
