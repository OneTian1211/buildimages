name: Build Node Image

on:
  workflow_dispatch:
    inputs:
      nodeVersion:
        description: 'Node Version'
        default: '24.10.0'
        required: true
      platforms:
        description: 'Platforms'
        default: 'linux/amd64,linux/arm64/v8'
        required: true
      pushLatest:
        description: 'Also push as :latest tag'
        default: 'false'
        required: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ✅ 升级到 v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 🔐 登录阿里云 ACR
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ALICR_REGISTRY }}
          username: ${{ secrets.ALICR_USERNAME }}
          password: ${{ secrets.ALICR_PASSWORD }}

      # 🏗️ 构建并推送阿里云镜像
      - name: Build Node Image and Push
        uses: docker/build-push-action@v6
        timeout-minutes: 120
        with:
          context: node
          file: node/Dockerfile
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          build-args: |
            NODE_VERSION=${{ github.event.inputs.nodeVersion }}
          tags: |
            ${{ secrets.ALICR_REGISTRY }}/${{ secrets.ALICR_NAMESPACE }}/node:${{ github.event.inputs.nodeVersion }}
            ${{ inputs.pushLatest && format('{0}/{1}/node:latest', secrets.ALICR_REGISTRY, secrets.ALICR_NAMESPACE) || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/OneTian1211/buildimages
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.event.inputs.nodeVersion }}
          outputs: type=image,oci-mediatypes=true,compression=zstd,compression-level=3,force-compression=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
